services:

  db:
    container_name: restaurant-booking-system-db
    image: postgres:latest
    env_file:
      - .env
    networks:
      - reservation_backend
    ports:
      - "5432:5432"
    volumes:
      - reservation_db:/var/lib/postgresql

  backend:
    container_name: restaurant-booking-system-backend
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/postgres
    env_file:
      - .env
    networks:
      - reservation_backend
    ports:
      - "8080:8080"
    depends_on:
       - db

networks:
  reservation_backend:
    external: true

volumes:
  reservation_db: